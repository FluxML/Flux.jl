steps:
  - label: "CUDA - Julia 1"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1: ~
      - JuliaCI/julia-coverage#v1:
          dirs:
            - src
            - ext
    agents:
      queue: "cuda"
    env:
      FLUX_TEST_CUDA: "true"
      FLUX_TEST_CPU: "false"
      FLUX_TEST_ENZYME: "false"
      FLUX_TEST_REACTANT: "true"
    timeout_in_minutes: 60

  - label: "AMDGPU - Julia 1"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1: ~
      - JuliaCI/julia-coverage#v1:
          dirs:
            - src
            - ext
    agents:
      queue: "rocm"
      rocmgpu: "*"
    timeout_in_minutes: 60
    env:
      JULIA_AMDGPU_CORE_MUST_LOAD: "1"
      JULIA_AMDGPU_HIP_MUST_LOAD: "1"
      JULIA_AMDGPU_DISABLE_ARTIFACTS: "1"
      FLUX_TEST_AMDGPU: "true"
      FLUX_TEST_CPU: "false"
      FLUX_TEST_ENZYME: "false"
      FLUX_TEST_REACTANT: "false"
      JULIA_NUM_THREADS: 4

  - label: "Metal - Julia 1"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          test_args: "--quickfail"
      - JuliaCI/julia-coverage#v1:
          dirs:
            - src
            - ext
    agents:
      queue: "metal"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 60
    env:
      FLUX_TEST_METAL: "true"
      FLUX_TEST_CPU: "false"
      FLUX_TEST_ENZYME: "false"
      FLUX_TEST_REACTANT: "true"

